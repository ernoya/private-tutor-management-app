name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install
      - run: node generate-icons.js
      - run: npm run build

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod

  apk:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create Android project structure
        run: |
          mkdir -p app/src/main/java/com/madrasti/tutor
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xxxhdpi

      - name: Generate icon
        run: |
          node generate-icons.js
          cp public/icon-512.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.madrasti.tutor">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="مدرستي"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/madrasti/tutor/MainActivity.java << 'JAVA'
          package com.madrasti.tutor;

          import android.app.Activity;
          import android.os.Bundle;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setUseWideViewPort(true);
                  settings.setLoadWithOverviewMode(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.loadUrl("https://private-tutor-management-app.vercel.app");
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVA

      - name: Write styles.xml
        run: |
          cat > app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:colorPrimary">#6366f1</item>
                  <item name="android:colorPrimaryDark">#4f46e5</item>
                  <item name="android:colorAccent">#8b5cf6</item>
                  <item name="android:statusBarColor">#6366f1</item>
              </style>
          </resources>
          XML

      - name: Write Gradle files
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              namespace 'com.madrasti.tutor'
              defaultConfig {
                  applicationId "com.madrasti.tutor"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          cat > settings.gradle << 'EOF'
          include ':app'
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=false
          EOF

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: madrasti-apk
          path: app/build/outputs/apk/debug/*.apk
